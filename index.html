<!DOCTYPE html>
<html lang="zh-TW" data-theme="spellbook">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疾疾，清單現身</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪄</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

        /* ── Palette ── */
        :root {
            --parchment-50:  #faf5ea;
            --parchment-100: #f4ebd4;
            --parchment-200: #e8dcba;
            --parchment-300: #d6c498;
            --parchment-400: #b59d6c;
            --parchment-500: #8a7147;
            --midnight-900:  #0b0a1f;
            --midnight-800:  #141235;
            --midnight-700:  #1e1b4a;
            --midnight-600:  #2d2863;
            --midnight-500:  #403a82;
            --gold-300:  #f6e6a4;
            --gold-400:  #ecd279;
            --gold-500:  #d4af37;
            --gold-600:  #a8831f;
            --gold-700:  #6b5310;
            --amethyst-300: #c7bde0;
            --amethyst-400: #9a8cc0;
            --amethyst-500: #6f5f95;
            --amethyst-600: #534476;
            --amethyst-700: #3a2e54;
            --ember-400: #d9a586;
            --ember-500: #b57a56;
            --ember-600: #8a5a3d;
            --moss-400:  #a8b894;
            --moss-500:  #7a8a5f;
            --moss-600:  #5a6845;
            --blood-500: #9a4f5a;

            /* ── Light (parchment) semantic tokens ── */
            --bg:           var(--parchment-50);
            --bg-elevated:  var(--parchment-100);
            --bg-sunken:    #f0e5cb;
            --surface-ink:  #fffdf4;
            --fg:           #241c0c;
            --fg-2:         #4a3a1e;
            --fg-3:         #7a6537;
            --fg-4:         var(--parchment-400);
            --border:       rgba(138,113,71,.28);
            --border-strong:rgba(138,113,71,.55);
            --border-ink:   rgba(36,28,12,.08);
            --accent:       var(--amethyst-500);
            --accent-fg:    #fffdf4;
            --accent-soft:  rgba(111,95,149,.14);
            --gold:         var(--gold-500);
            --gold-soft:    rgba(212,175,55,.14);
            --danger:       var(--blood-500);
            --cat-prophet:      var(--amethyst-500);
            --cat-prophet-soft: rgba(111,95,149,.12);
            --cat-trunk:        var(--ember-500);
            --cat-trunk-soft:   rgba(181,122,86,.14);
            --cat-study:        var(--moss-500);
            --cat-study-soft:   rgba(122,138,95,.14);

            /* ── Typography ── */
            --font-display: "Cinzel","Noto Serif TC","Songti TC",serif;
            --font-body:    "Noto Serif TC","Cormorant Garamond","Songti TC",Georgia,serif;
            --font-incant:  "IM Fell English SC","Cormorant Garamond",serif;
            --font-mono:    "IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
            --fs-xs:10px; --fs-sm:13px; --fs-base:15px; --fs-md:18px;
            --fs-lg:22px; --fs-xl:28px; --fs-2xl:36px;
            --lh-tight:1.15; --lh-snug:1.3; --lh-base:1.55;
            --ls-wide:.08em; --ls-xwide:.18em;

            /* ── Spacing ── */
            --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px;
            --sp-5:20px; --sp-6:24px; --sp-7:32px; --sp-8:40px; --sp-9:56px;

            /* ── Radii ── */
            --r-xs:2px; --r-sm:4px; --r-md:8px; --r-lg:14px; --r-xl:22px; --r-pill:999px;

            /* ── Shadows ── */
            --shadow-sm: 0 1px 2px rgba(54,40,15,.08),0 1px 1px rgba(54,40,15,.04);
            --shadow-md: 0 2px 4px rgba(54,40,15,.08),0 6px 14px rgba(54,40,15,.09);
            --shadow-lg: 0 8px 18px rgba(54,40,15,.12),0 20px 40px rgba(54,40,15,.1);
            --shadow-ink:inset 0 0 0 1px rgba(36,28,12,.08);
            --glow-gold:     0 0 0 1px rgba(212,175,55,.55),0 0 24px rgba(212,175,55,.45);
            --glow-amethyst: 0 0 0 1px rgba(111,95,149,.55),0 0 26px rgba(111,95,149,.4);

            /* ── Motion ── */
            --ease-stand:  cubic-bezier(.22,.61,.36,1);
            --ease-magic:  cubic-bezier(.34,1.56,.64,1);
            --ease-settle: cubic-bezier(.16,1,.3,1);
            --dur-fast:120ms; --dur-base:220ms; --dur-slow:420ms;
        }

        /* ── Dark / Spellbook overrides ── */
        [data-theme="spellbook"] {
            --bg:           var(--midnight-900);
            --bg-elevated:  var(--midnight-800);
            --bg-sunken:    #08071a;
            --surface-ink:  var(--midnight-700);
            --fg:           #f4ebd4;
            --fg-2:         #d6c498;
            --fg-3:         #a8966a;
            --fg-4:         #6f6142;
            --border:       rgba(214,196,152,.14);
            --border-strong:rgba(214,196,152,.3);
            --border-ink:   rgba(244,235,212,.05);
            --accent:       var(--amethyst-400);
            --accent-fg:    var(--midnight-900);
            --accent-soft:  rgba(154,140,192,.2);
            --gold-soft:    rgba(236,210,121,.16);
            --cat-prophet-soft: rgba(154,140,192,.2);
            --cat-trunk-soft:   rgba(217,165,134,.18);
            --cat-study-soft:   rgba(168,184,148,.18);
            --shadow-sm: 0 1px 2px rgba(0,0,0,.5);
            --shadow-md: 0 4px 10px rgba(0,0,0,.45),0 12px 28px rgba(0,0,0,.35);
            --shadow-lg: 0 12px 30px rgba(0,0,0,.55),0 28px 60px rgba(0,0,0,.4);
            --shadow-ink:inset 0 0 0 1px rgba(244,235,212,.05);
        }

        /* ── Reset ── */
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            font-size: var(--fs-base);
            line-height: var(--lh-base);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            transition: background var(--dur-slow) var(--ease-stand), color var(--dur-slow) var(--ease-stand);
            overflow-x: hidden;
        }
        [data-theme="spellbook"] body {
            background-image:
                radial-gradient(ellipse at 15% 45%, rgba(111,95,149,.10) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, rgba(212,175,55,.07) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 5%,  rgba(154,140,192,.06) 0%, transparent 40%);
        }

        /* ───────────── NAV ───────────── */
        .nav {
            position: sticky; top: 0; z-index: 100;
            height: 64px;
            padding: 0 var(--sp-7);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            transition: background var(--dur-slow) var(--ease-stand);
        }
        [data-theme="spellbook"] .nav { background: rgba(11,10,31,.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
        [data-theme="parchment"] .nav { background: rgba(250,245,234,.80); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }

        .nav-left  { display:flex; align-items:center; gap:var(--sp-3); }
        .nav-right { display:flex; align-items:center; gap:var(--sp-2); }

        .nav-orb {
            width:36px; height:36px; border-radius:50%; flex-shrink:0;
            background: radial-gradient(circle at 30% 30%, var(--amethyst-300), var(--amethyst-600) 60%, var(--midnight-800));
            box-shadow: var(--glow-amethyst);
            display:flex; align-items:center; justify-content:center; font-size:18px;
        }
        .nav-brand {
            font-family: var(--font-display); font-size:20px; font-weight:600;
            letter-spacing: var(--ls-wide); line-height:1;
        }
        .nav-tagline {
            font-family: var(--font-incant); font-size:10px;
            letter-spacing: var(--ls-xwide); color: var(--gold-600);
            text-transform: uppercase; margin-top:2px;
        }
        [data-theme="spellbook"] .nav-tagline { color: var(--gold-400); }

        .btn-theme {
            width:40px; height:40px; border-radius:50%;
            border:1px solid var(--border-strong); background:var(--surface-ink);
            color:var(--fg); cursor:pointer; font-size:16px;
            display:flex; align-items:center; justify-content:center;
            transition: all var(--dur-base) var(--ease-stand);
        }
        .btn-theme:hover { box-shadow: var(--glow-amethyst); }

        .nav-user {
            display:flex; align-items:center; gap:var(--sp-2);
            padding:6px 12px 6px 6px;
            border:1px solid var(--border-strong);
            border-radius: var(--r-pill);
            background: var(--surface-ink);
        }
        .nav-avatar {
            width:28px; height:28px; border-radius:50%;
            background: linear-gradient(135deg, var(--amethyst-400), var(--gold-500));
            display:flex; align-items:center; justify-content:center;
            color:var(--midnight-900); font-weight:700; font-size:13px;
        }
        .nav-username { font-size:13px; font-weight:600; }
        .btn-logout {
            background:transparent; border:none; cursor:pointer;
            color:var(--fg-3); font-size:11px; font-family:var(--font-body);
            transition: color var(--dur-base) var(--ease-stand);
        }
        .btn-logout:hover { color: var(--danger); }

        /* ───────────── LOGIN ───────────── */
        .login-container {
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; padding:var(--sp-5);
        }
        .login-card {
            background: var(--surface-ink);
            border:1px solid var(--border-strong);
            border-radius: var(--r-xl);
            padding: var(--sp-9) var(--sp-8);
            box-shadow: var(--shadow-lg), var(--shadow-ink);
            max-width:400px; width:100%;
            display:flex; flex-direction:column; align-items:center;
            gap:var(--sp-4);
        }
        .login-orb-wrap {
            width:72px; height:72px; border-radius:50%;
            background: radial-gradient(circle at 30% 30%, var(--amethyst-300), var(--amethyst-600) 60%, var(--midnight-800));
            box-shadow: var(--glow-amethyst);
            display:flex; align-items:center; justify-content:center; font-size:36px;
        }
        .login-brand { text-align:center; }
        .login-brand-title {
            font-family:var(--font-display); font-size:var(--fs-2xl); font-weight:600;
            letter-spacing:var(--ls-wide); color:var(--fg);
        }
        .login-brand-sub {
            font-family:var(--font-incant); font-size:var(--fs-xs);
            letter-spacing:var(--ls-xwide); color:var(--gold-600);
            text-transform:uppercase; margin-top:4px;
        }
        [data-theme="spellbook"] .login-brand-sub { color:var(--gold-400); }
        .login-desc { font-size:var(--fs-sm); color:var(--fg-3); text-align:center; }
        .btn-google {
            display:flex; align-items:center; justify-content:center; gap:var(--sp-2);
            width:100%; padding:12px var(--sp-5);
            border:1px solid var(--border-strong); border-radius:var(--r-lg);
            background:var(--bg-elevated); color:var(--fg);
            font-family:var(--font-body); font-size:var(--fs-sm); font-weight:600;
            cursor:pointer; transition: all var(--dur-base) var(--ease-stand);
            box-shadow: var(--shadow-sm);
        }
        .btn-google:hover { box-shadow:var(--shadow-md),var(--glow-amethyst); transform:translateY(-1px); }
        .error-message { color:var(--danger); text-align:center; font-size:var(--fs-sm); }

        /* ───────────── DASHBOARD ───────────── */
        .dashboard-container { display:none; flex-direction:column; min-height:100vh; }
        .dashboard-container.active { display:flex; }
        .main-content {
            flex:1; padding:var(--sp-6);
            max-width:1440px; margin:0 auto; width:100%;
        }
        .dashboard-grid {
            display:grid; grid-template-columns:1fr 1fr;
            column-gap:var(--sp-5); row-gap:var(--sp-5);
            align-items:start;
        }

        /* ───────────── SECTION (CategoryColumn) ───────────── */
        .section {
            border-radius:var(--r-lg); overflow:hidden;
            background:var(--surface-ink);
            border:1px solid var(--border);
            box-shadow:var(--shadow-md),var(--shadow-ink);
            display:flex; flex-direction:column;
            transition: box-shadow var(--dur-base) var(--ease-stand), transform var(--dur-base) var(--ease-stand);
        }
        .section:hover { box-shadow:var(--shadow-lg),var(--shadow-ink); }

        .section.prophet { grid-row:1/3; }

        .section-color-bar { height:3px; flex-shrink:0; }
        .section.prophet .section-color-bar { background:var(--cat-prophet); }
        .section.others  .section-color-bar { background:var(--cat-trunk); }
        .section.focus   .section-color-bar { background:var(--cat-study); }

        .section-header {
            padding:var(--sp-5) var(--sp-5) var(--sp-3);
            display:flex; align-items:flex-end; justify-content:space-between;
            flex-wrap:wrap; gap:var(--sp-2);
            border-bottom:1px solid var(--border);
        }
        .section-header-left { display:flex; flex-direction:column; gap:4px; }
        .section-incant {
            font-family:var(--font-incant); letter-spacing:var(--ls-xwide);
            font-size:10px; text-transform:uppercase;
        }
        .section.prophet .section-incant { color:var(--cat-prophet); }
        .section.others  .section-incant { color:var(--cat-trunk); }
        .section.focus   .section-incant { color:var(--cat-study); }

        .section-title-row { display:flex; align-items:center; gap:10px; }
        .section-sigil { font-size:24px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.15)); }
        .section-title { font-family:var(--font-body); font-size:var(--fs-lg); font-weight:700; color:var(--fg); }

        .btn-add {
            display:flex; align-items:center; gap:var(--sp-2);
            padding:var(--sp-2) var(--sp-3);
            border:1px dashed var(--border-strong); border-radius:var(--r-md);
            background:transparent; color:var(--fg-3);
            font-family:var(--font-body); font-size:13px; font-weight:500;
            cursor:pointer; transition:all var(--dur-base) var(--ease-stand); white-space:nowrap;
        }
        .section.prophet .btn-add:hover { border-color:var(--cat-prophet); color:var(--cat-prophet); background:var(--cat-prophet-soft); }
        .section.others  .btn-add:hover { border-color:var(--cat-trunk);   color:var(--cat-trunk);   background:var(--cat-trunk-soft); }
        .section.focus   .btn-add:hover { border-color:var(--cat-study);   color:var(--cat-study);   background:var(--cat-study-soft); }

        /* ───────────── WEEKLY GRID ───────────── */
        .weekly-grid {
            display:flex; flex-direction:column; gap:var(--sp-3);
            padding:var(--sp-3) var(--sp-4) var(--sp-4);
        }
        .day-column {
            background:var(--bg-elevated); border-radius:var(--r-md);
            padding:var(--sp-3); min-height:72px;
            border:1px solid var(--border);
            transition:all var(--dur-base) var(--ease-stand);
        }
        .day-column:hover { border-color:var(--border-strong); }
        .day-column.drag-over {
            border:1.5px dashed var(--cat-prophet);
            background:var(--cat-prophet-soft);
            box-shadow:var(--glow-amethyst);
        }
        .day-title {
            font-family:var(--font-incant); font-size:11px;
            letter-spacing:var(--ls-xwide); text-transform:uppercase;
            color:var(--cat-prophet); margin-bottom:var(--sp-2);
            padding-bottom:var(--sp-2); border-bottom:1px solid var(--border);
        }

        /* ───────────── TODO LIST ───────────── */
        .todo-list {
            display:flex; flex-direction:column; gap:var(--sp-2);
            padding:var(--sp-3) var(--sp-4) var(--sp-4);
        }
        .day-column .todo-list { padding:0; margin-top:var(--sp-1); }

        /* ───────────── TASK ITEM ───────────── */
        .todo-item {
            display:flex; align-items:flex-start; gap:var(--sp-2);
            padding:10px var(--sp-3);
            background:var(--surface-ink);
            border:1px solid var(--border); border-radius:var(--r-md);
            box-shadow:var(--shadow-sm),var(--shadow-ink);
            cursor:default; position:relative;
            transition:all var(--dur-base) var(--ease-stand);
        }
        .todo-item:hover {
            box-shadow:var(--shadow-md),var(--shadow-ink);
            transform:translateY(-1px); border-color:var(--border-strong);
        }
        .todo-item.important {
            border-left:2.5px solid var(--gold-500);
            background:var(--gold-soft);
        }
        .todo-item.dragging { opacity:.45; }
        .todo-item.drag-after { border-top:2px solid var(--accent); margin-top:6px; }

        .drag-handle {
            color:var(--fg-4); font-size:14px; cursor:grab;
            flex-shrink:0; margin-top:2px; user-select:none;
            transition:color var(--dur-fast) var(--ease-stand);
        }
        .drag-handle:hover { color:var(--fg-3); }
        .drag-handle:active { cursor:grabbing; }

        .todo-checkbox {
            position:relative; width:22px; height:22px; border-radius:50%;
            border:1.5px solid var(--border-strong);
            display:inline-flex; align-items:center; justify-content:center;
            flex-shrink:0; margin-top:1px;
            background:transparent; color:var(--midnight-900);
            font-size:11px; font-weight:700; cursor:pointer;
            transition:all var(--dur-base) var(--ease-magic);
        }
        .todo-checkbox:hover { border-color:var(--gold-500); }
        .todo-checkbox.important {
            border-color:var(--gold-700);
            background:radial-gradient(circle, var(--gold-400), var(--gold-600));
            box-shadow:var(--glow-gold);
        }

        .todo-content { flex:1; min-width:0; }
        .todo-text {
            font-size:15px; font-weight:500; color:var(--fg);
            word-break:break-word; word-wrap:break-word; overflow-wrap:break-word;
            line-height:var(--lh-snug);
        }
        .todo-text a { color:var(--gold-500); text-decoration:underline; text-underline-offset:2px; }
        .note-text {
            font-size:var(--fs-sm); color:var(--fg-3); margin-top:var(--sp-1);
            font-style:italic; word-break:break-word; overflow-wrap:break-word;
            white-space:pre-wrap; display:-webkit-box;
            -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
        }
        .note-text a { color:var(--gold-500); text-decoration:underline; }

        .todo-actions { display:flex; gap:4px; align-items:center; flex-shrink:0; }
        .action-btn {
            width:28px; height:28px; border-radius:var(--r-sm); border:none;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:13px; background:transparent; color:var(--fg-3);
            transition:all var(--dur-fast) var(--ease-stand);
        }
        .action-btn:hover { background:var(--accent-soft); color:var(--accent); }
        .action-btn.danger:hover { background:rgba(154,79,90,.12); color:var(--blood-500); }

        /* ───────────── MODAL ───────────── */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(11,10,31,.65); z-index:500;
            justify-content:center; align-items:center;
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
        }
        .modal.active { display:flex; }
        .modal-content {
            background:var(--surface-ink);
            border:1px solid var(--border-strong); border-radius:var(--r-xl);
            padding:var(--sp-7); max-width:520px; width:92%;
            box-shadow:var(--shadow-lg),var(--shadow-ink);
            display:flex; flex-direction:column; gap:var(--sp-5);
        }
        .modal-title {
            font-family:var(--font-display); font-size:var(--fs-xl); font-weight:600;
            letter-spacing:var(--ls-wide); color:var(--fg);
        }
        .field-label {
            display:block; font-family:var(--font-incant);
            letter-spacing:var(--ls-xwide); font-size:10px;
            color:var(--gold-700); margin-bottom:var(--sp-1); text-transform:uppercase;
        }
        [data-theme="spellbook"] .field-label { color:var(--gold-400); }
        .modal-field { display:flex; flex-direction:column; }
        .modal-input, .modal-textarea {
            width:100%; box-sizing:border-box;
            font-family:var(--font-body); font-size:15px;
            padding:10px var(--sp-3); border-radius:var(--r-md);
            border:1px solid var(--border-strong);
            background:var(--bg-elevated); color:var(--fg);
            outline:none; transition:all var(--dur-base) var(--ease-stand);
        }
        .modal-textarea { min-height:100px; resize:vertical; }
        .modal-input:focus, .modal-textarea:focus {
            border-color:transparent; box-shadow:var(--glow-amethyst);
        }
        .modal-buttons { display:flex; gap:var(--sp-3); justify-content:flex-end; }
        .modal-btn {
            padding:10px var(--sp-6); border-radius:var(--r-lg);
            font-family:var(--font-body); font-size:15px; font-weight:600;
            cursor:pointer; transition:all var(--dur-base) var(--ease-stand);
        }
        .modal-btn.primary {
            background:var(--accent); color:var(--accent-fg); border:1px solid transparent;
        }
        .modal-btn.primary:hover { box-shadow:var(--glow-amethyst); transform:translateY(-1px); }
        .modal-btn.secondary {
            background:transparent; color:var(--fg-2); border:1px solid var(--border-strong);
        }
        .modal-btn.secondary:hover { background:var(--accent-soft); }

        /* ───────────── DAY CHIPS ───────────── */
        .day-button-group { display:flex; gap:var(--sp-2); flex-wrap:wrap; }
        .day-button {
            padding:6px 12px; border-radius:var(--r-pill); font-size:13px; font-weight:600;
            border:1px solid var(--border-strong); background:var(--bg-elevated); color:var(--fg-2);
            cursor:pointer; font-family:var(--font-body); white-space:nowrap;
            transition:all var(--dur-base) var(--ease-stand);
        }
        .day-button:hover { border-color:var(--cat-prophet); color:var(--cat-prophet); }
        .day-button.selected {
            background:var(--cat-prophet-soft); border-color:var(--cat-prophet); color:var(--cat-prophet);
        }

        .hidden { display:none !important; }

        /* ───────────── SPARKLE ───────────── */
        @keyframes accioRise {
            0%   { opacity:1; transform:translateY(0) scale(1); }
            100% { opacity:0; transform:translateY(-28px) scale(.3); }
        }

        /* ───────────── RESPONSIVE ───────────── */
        @media (max-width:1024px) {
            .dashboard-grid { grid-template-columns:1fr; }
            .section.prophet { grid-row:auto; }
        }
        @media (max-width:768px) {
            .main-content { padding:var(--sp-4); }
            .nav { padding:0 var(--sp-4); }
            .section-title { font-size:var(--fs-md); }
        }
        @media (max-width:480px) {
            .main-content { padding:var(--sp-3); }
            .nav-tagline, .nav-username { display:none; }
            .login-card { padding:var(--sp-7) var(--sp-5); }
            .section-header { padding:var(--sp-4) var(--sp-4) var(--sp-3); }
        }
    </style>
</head>

<body>
    <!-- 登入頁面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-orb-wrap">🔮</div>
            <div class="login-brand">
                <div class="login-brand-title">ACCIO</div>
                <div class="login-brand-sub">魔法待辦 2.0</div>
            </div>
            <p class="login-desc">使用 Google 帳號施展登入魔法</p>
            <button class="btn-google" onclick="login()">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                使用 Google 登入
            </button>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <!-- Dashboard 主頁面 -->
    <div class="dashboard-container" id="dashboardContainer">
        <!-- Nav -->
        <nav class="nav">
            <div class="nav-left">
                <div class="nav-orb">🔮</div>
                <div>
                    <div class="nav-brand">ACCIO</div>
                    <div class="nav-tagline">魔法待辦 2.0</div>
                </div>
            </div>
            <div class="nav-right">
                <button class="btn-theme" id="themeToggle" onclick="toggleTheme()" title="切換主題">☀️</button>
                <div class="nav-user">
                    <div class="nav-avatar" id="navAvatar">魔</div>
                    <span class="nav-username" id="navUsername">法師</span>
                    <button class="btn-logout" onclick="logout()">登出</button>
                </div>
            </div>
        </nav>

        <!-- Main -->
        <div class="main-content">
            <div class="dashboard-grid">
                <!-- 預言家日報 -->
                <div class="section prophet" data-section="prophet" id="prophetSection">
                    <div class="section-color-bar"></div>
                    <div class="section-header">
                        <div class="section-header-left">
                            <div class="section-incant">✦ PROPHET'S DAILY ✦</div>
                            <div class="section-title-row">
                                <span class="section-sigil">🔮</span>
                                <h2 class="section-title">預言家日報</h2>
                            </div>
                        </div>
                        <button class="btn-add" onclick="showAddModal('prophet')">✨ 施展新魔法</button>
                    </div>
                    <div class="weekly-grid" id="prophetGrid"></div>
                </div>

                <!-- 行李箱 -->
                <div class="section others" data-section="others">
                    <div class="section-color-bar"></div>
                    <div class="section-header">
                        <div class="section-header-left">
                            <div class="section-incant">✦ THE TRUNK ✦</div>
                            <div class="section-title-row">
                                <span class="section-sigil">🧳</span>
                                <h2 class="section-title">行李箱</h2>
                            </div>
                        </div>
                        <button class="btn-add" onclick="showAddModal('others')">✨ 施展新魔法</button>
                    </div>
                    <div class="todo-list" id="others"></div>
                </div>

                <!-- 魔法研究 -->
                <div class="section focus" data-section="focus">
                    <div class="section-color-bar"></div>
                    <div class="section-header">
                        <div class="section-header-left">
                            <div class="section-incant">✦ MAGICAL STUDIES ✦</div>
                            <div class="section-title-row">
                                <span class="section-sigil">🧙</span>
                                <h2 class="section-title">魔法研究</h2>
                            </div>
                        </div>
                        <button class="btn-add" onclick="showAddModal('focus')">✨ 施展新魔法</button>
                    </div>
                    <div class="todo-list" id="focus"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增待辦 Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3 class="modal-title">新增魔法任務</h3>
            <div id="dayButtonGroup" class="day-button-group hidden"></div>
            <div class="modal-field">
                <label class="field-label">任務咒語</label>
                <input class="modal-input" type="text" id="newTodoText" placeholder="輸入魔法任務…" />
            </div>
            <div class="modal-field">
                <label class="field-label">魔法筆記</label>
                <textarea class="modal-textarea" id="newTodoNote" placeholder="輸入魔法筆記…"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeAddModal()">取消</button>
                <button class="modal-btn primary" onclick="addTodo()">施展魔法</button>
            </div>
        </div>
    </div>

    <!-- 編輯待辦事項 Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 class="modal-title">編輯魔法任務</h3>
            <div class="modal-field">
                <label class="field-label">任務咒語</label>
                <input class="modal-input" type="text" id="editTodoText" placeholder="輸入魔法任務…" />
            </div>
            <div class="modal-field">
                <label class="field-label">魔法筆記</label>
                <textarea class="modal-textarea" id="editTodoNote" placeholder="輸入魔法筆記…"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeEditModal()">取消</button>
                <button class="modal-btn primary" onclick="saveEditTodo()">儲存</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, set, get, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDeqJaIZ6L8oFO1xBumtPT93g9G9Dm2du8",
            authDomain: "mydashboard-8aa06.firebaseapp.com",
            databaseURL: "https://mydashboard-8aa06-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mydashboard-8aa06",
            storageBucket: "mydashboard-8aa06.firebasestorage.app",
            messagingSenderId: "150879644790",
            appId: "1:150879644790:web:a070839e87f39f82fe8357"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        setPersistence(auth, browserLocalPersistence);

        window.currentUser = null;
        window.currentEditingId = null;
        window.currentAddSection = null;
        window.currentEditingTodoId = null;
        window.workingDays = [];
        window.expiredTasksMoved = false;

        // ── Theme toggle ──
        window.toggleTheme = function () {
            const html = document.documentElement;
            const isSpellbook = html.getAttribute('data-theme') === 'spellbook';
            html.setAttribute('data-theme', isSpellbook ? 'parchment' : 'spellbook');
            document.getElementById('themeToggle').textContent = isSpellbook ? '🌙' : '☀️';
        };

        // ── Auth ──
        window.login = async function () {
            const errorMessage = document.getElementById('errorMessage');
            try {
                const result = await signInWithPopup(auth, provider);
                window.currentUser = result.user;
                errorMessage.textContent = '';
            } catch (error) {
                console.error('登入錯誤：', error);
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage.textContent = '登入視窗已關閉';
                } else if (error.code === 'auth/popup-blocked') {
                    errorMessage.textContent = '請允許彈出視窗以完成登入';
                } else {
                    errorMessage.textContent = '登入失敗：' + error.message;
                }
            }
        };

        window.logout = async function () {
            await signOut(auth);
            window.currentUser = null;
            showLogin();
        };

        if (window.location.hash === '#test') {
            window.currentUser = { uid: 'test-user', displayName: '測試魔法師' };
            showDashboard();
            setTimeout(() => { initializeDragAndDrop(); }, 100);
            setInterval(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                const firstDay = window.workingDays[0];
                if (firstDay) {
                    const firstDayDate = new Date(firstDay); firstDayDate.setHours(0,0,0,0);
                    if (firstDayDate.getTime() !== today.getTime()) {
                        window.expiredTasksMoved = false;
                        generateWorkingDays();
                    }
                }
            }, 3600000);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                showDashboard();
                loadTodos();
                setInterval(() => {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const firstDay = window.workingDays[0];
                    if (firstDay) {
                        const firstDayDate = new Date(firstDay); firstDayDate.setHours(0,0,0,0);
                        if (firstDayDate.getTime() !== today.getTime()) {
                            window.expiredTasksMoved = false;
                            generateWorkingDays();
                            loadTodos();
                        }
                    }
                }, 3600000);
            } else {
                if (window.location.hash !== '#test') showLogin();
            }
        });

        function showLogin() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').classList.remove('active');
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').classList.add('active');
            generateWorkingDays();
            // Update nav user info
            if (window.currentUser) {
                const name = window.currentUser.displayName || '魔法師';
                document.getElementById('navAvatar').textContent = name[0] || '魔';
                document.getElementById('navUsername').textContent = name;
            }
        }

        function calculateWorkingDays() {
            const days = [];
            let currentDate = new Date();
            currentDate.setHours(0,0,0,0);
            while (days.length < 10) {
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) days.push(new Date(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return days;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateDisplay(date) {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const dayNames = ['週日','週一','週二','週三','週四','週五','週六'];
            return `${month}/${day} (${dayNames[date.getDay()]})`;
        }

        function generateWorkingDays() {
            window.workingDays = calculateWorkingDays();
            const prophetGrid = document.getElementById('prophetGrid');
            prophetGrid.innerHTML = '';
            window.workingDays.forEach((date) => {
                const dateStr = formatDate(date);
                const displayStr = formatDateDisplay(date);
                const dayColumn = document.createElement('div');
                dayColumn.className = 'day-column';
                dayColumn.dataset.day = dateStr;
                dayColumn.innerHTML = `
                    <div class="day-title">${displayStr}</div>
                    <div class="todo-list" id="${dateStr}"></div>
                `;
                prophetGrid.appendChild(dayColumn);
            });
            setTimeout(() => { initializeDragAndDrop(); }, 100);
        }

        async function loadTodos() {
            if (!window.currentUser) return;
            const userId = window.currentUser.uid;
            const todosRef = ref(database, `users/${userId}/todos`);
            await migrateOldTodos();
            onValue(todosRef, async (snapshot) => {
                window.workingDays.forEach(date => {
                    const container = document.getElementById(formatDate(date));
                    if (container) container.innerHTML = '';
                });
                const othersContainer = document.getElementById('others');
                const focusContainer = document.getElementById('focus');
                if (othersContainer) othersContainer.innerHTML = '';
                if (focusContainer) focusContainer.innerHTML = '';

                const data = snapshot.val();
                if (data) {
                    const todosArray = Object.keys(data).map(id => ({ id, ...data[id] }));
                    todosArray.sort((a, b) => (a.order || a.createdAt || 0) - (b.order || b.createdAt || 0));
                    if (!window.expiredTasksMoved) {
                        await moveExpiredTasksToToday(todosArray);
                        window.expiredTasksMoved = true;
                    }
                    todosArray.forEach(todo => renderTodo(todo.id, todo));
                }
            });
        }

        async function migrateOldTodos() {
            if (!window.currentUser) return;
            const userId = window.currentUser.uid;
            const migrationFlagRef = ref(database, `users/${userId}/migrated`);
            const migrationSnapshot = await get(migrationFlagRef);
            if (migrationSnapshot.exists()) {
                await cleanInvalidSections();
                return;
            }
            const todosRef = ref(database, `users/${userId}/todos`);
            const snapshot = await get(todosRef);
            if (!snapshot.exists()) {
                await set(migrationFlagRef, true);
                return;
            }
            const data = snapshot.val();
            const updatePromises = [];
            const oldSections = ['monday','tuesday','wednesday','thursday','friday','next_monday','next_tuesday','next_wednesday','next_thursday','next_friday'];
            Object.keys(data).forEach(id => {
                if (oldSections.includes(data[id].section)) {
                    updatePromises.push(set(ref(database, `users/${userId}/todos/${id}`), { ...data[id], section: 'focus' }));
                }
            });
            if (updatePromises.length > 0) await Promise.all(updatePromises);
            await set(migrationFlagRef, true);
            await cleanInvalidSections();
        }

        async function cleanInvalidSections() {
            if (!window.currentUser) return;
            const userId = window.currentUser.uid;
            const snapshot = await get(ref(database, `users/${userId}/todos`));
            if (!snapshot.exists()) return;
            const data = snapshot.val();
            const invalidSections = ['prophet','weekly','nextweek'];
            const updatePromises = [];
            Object.keys(data).forEach(id => {
                if (invalidSections.includes(data[id].section)) {
                    updatePromises.push(set(ref(database, `users/${userId}/todos/${id}`), { ...data[id], section: 'focus' }));
                }
            });
            if (updatePromises.length > 0) await Promise.all(updatePromises);
        }

        async function moveExpiredTasksToToday(todosArray) {
            if (!window.currentUser || window.workingDays.length === 0) return;
            const userId = window.currentUser.uid;
            const today = formatDate(window.workingDays[0]);
            const todayDate = new Date(today);
            const updatePromises = [];
            todosArray.forEach(todo => {
                if (/^\d{4}-\d{2}-\d{2}$/.test(todo.section)) {
                    if (new Date(todo.section) < todayDate) {
                        updatePromises.push(set(ref(database, `users/${userId}/todos/${todo.id}`), { ...todo, section: today }));
                    }
                }
            });
            if (updatePromises.length > 0) await Promise.all(updatePromises);
        }

        // ── Render ──
        function renderTodo(id, todo) {
            const container = document.getElementById(todo.section);
            if (!container) return;

            const todoDiv = document.createElement('div');
            todoDiv.className = `todo-item${todo.important ? ' important' : ''}`;
            todoDiv.draggable = true;
            todoDiv.dataset.id = id;

            todoDiv.innerHTML = `
                <span class="drag-handle" title="拖曳">⋮⋮</span>
                <span class="todo-checkbox${todo.important ? ' important' : ''}" onclick="toggleImportant('${id}')" title="標記重要">
                    ${todo.important ? '✦' : ''}
                </span>
                <div class="todo-content">
                    <div class="todo-text">${linkifyUrls(todo.text)}</div>
                    ${todo.note ? `<div class="note-text">${linkifyUrls(todo.note)}</div>` : ''}
                </div>
                <div class="todo-actions">
                    <button class="action-btn" onclick="showEditModal('${id}')" title="編輯">✎</button>
                    <button class="action-btn danger" onclick="deleteTodo('${id}')" title="消除 (Evanesco)">✕</button>
                </div>
            `;

            todoDiv.addEventListener('dragstart', handleDragStart);
            todoDiv.addEventListener('dragend', handleDragEnd);
            container.appendChild(todoDiv);
        }

        // ── Add Modal ──
        window.showAddModal = function (section) {
            window.currentAddSection = section;
            window.selectedDay = null;
            const modal = document.getElementById('addModal');
            const dayButtonGroup = document.getElementById('dayButtonGroup');

            if (section === 'prophet') {
                dayButtonGroup.classList.remove('hidden');
                dayButtonGroup.innerHTML = '';
                window.workingDays.slice(0, 5).forEach((date) => {
                    const dateStr = formatDate(date);
                    const displayStr = formatDateDisplay(date);
                    const button = document.createElement('button');
                    button.className = 'day-button';
                    button.dataset.day = dateStr;
                    button.textContent = displayStr;
                    button.addEventListener('click', function () {
                        dayButtonGroup.querySelectorAll('.day-button').forEach(b => b.classList.remove('selected'));
                        this.classList.add('selected');
                        window.selectedDay = this.dataset.day;
                    });
                    dayButtonGroup.appendChild(button);
                });
                dayButtonGroup.querySelector('.day-button').click();
            } else {
                dayButtonGroup.classList.add('hidden');
            }

            document.getElementById('newTodoText').value = '';
            document.getElementById('newTodoNote').value = '';
            modal.classList.add('active');
        };

        window.closeAddModal = function () {
            document.getElementById('addModal').classList.remove('active');
        };

        window.addTodo = async function () {
            const text = document.getElementById('newTodoText').value.trim();
            if (!text) return;
            const note = document.getElementById('newTodoNote').value.trim();
            let section = window.currentAddSection;
            if (section === 'prophet') section = window.selectedDay;
            const userId = window.currentUser.uid;
            const todoId = Date.now().toString();
            await set(ref(database, `users/${userId}/todos/${todoId}`), {
                text, section, important: false, note,
                createdAt: Date.now(), order: Date.now()
            });
            closeAddModal();
        };

        // ── Important ──
        window.toggleImportant = async function (id) {
            const userId = window.currentUser.uid;
            const todoRef = ref(database, `users/${userId}/todos/${id}`);
            const snapshot = await get(todoRef);
            if (snapshot.exists()) {
                const todo = snapshot.val();
                await set(todoRef, { ...todo, important: !todo.important });
            }
        };

        // ── Edit Modal ──
        window.showEditModal = async function (id) {
            window.currentEditingTodoId = id;
            const userId = window.currentUser.uid;
            const snapshot = await get(ref(database, `users/${userId}/todos/${id}`));
            if (snapshot.exists()) {
                const todo = snapshot.val();
                document.getElementById('editTodoText').value = todo.text || '';
                document.getElementById('editTodoNote').value = todo.note || '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        window.closeEditModal = function () {
            document.getElementById('editModal').classList.remove('active');
            window.currentEditingTodoId = null;
        };

        window.saveEditTodo = async function () {
            const newText = document.getElementById('editTodoText').value.trim();
            if (!newText) { alert('待辦事項不能為空'); return; }
            const newNote = document.getElementById('editTodoNote').value.trim();
            const id = window.currentEditingTodoId;
            const userId = window.currentUser.uid;
            const todoRef = ref(database, `users/${userId}/todos/${id}`);
            const snapshot = await get(todoRef);
            if (snapshot.exists()) {
                await set(todoRef, { ...snapshot.val(), text: newText, note: newNote });
            }
            closeEditModal();
        };

        // ── Delete ──
        window.deleteTodo = async function (id) {
            if (!confirm('是否確定刪除？')) return;
            await remove(ref(database, `users/${window.currentUser.uid}/todos/${id}`));
        };

        // ── Drag & Drop ──
        let draggedElement = null;
        let afterElement = null;
        let dropSuccessful = false;
        let originalParent = null;
        let originalNextSibling = null;

        function handleDragStart(e) {
            draggedElement = this;
            dropSuccessful = false;
            originalParent = this.parentElement;
            originalNextSibling = this.nextElementSibling;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.todo-item').forEach(item => item.classList.remove('drag-after'));
            if (!dropSuccessful) {
                const elementToRestore = draggedElement;
                const targetParent = originalParent;
                const targetNextSibling = originalNextSibling;
                if (targetParent && elementToRestore) {
                    setTimeout(() => {
                        if (!elementToRestore.parentElement) {
                            targetNextSibling && targetNextSibling.parentElement === targetParent
                                ? targetParent.insertBefore(elementToRestore, targetNextSibling)
                                : targetParent.appendChild(elementToRestore);
                        } else if (elementToRestore.parentElement !== targetParent) {
                            targetNextSibling && targetNextSibling.parentElement === targetParent
                                ? targetParent.insertBefore(elementToRestore, targetNextSibling)
                                : targetParent.appendChild(elementToRestore);
                        }
                    }, 0);
                }
            }
            draggedElement = null; originalParent = null; originalNextSibling = null; dropSuccessful = false;
        }

        function initializeDragAndDrop() {
            const dropZones = document.querySelectorAll('.todo-list, .day-column, .section');
            dropZones.forEach(zone => {
                zone.removeEventListener('dragover', handleDragOver);
                zone.removeEventListener('drop', handleDrop);
                zone.removeEventListener('dragleave', handleDragLeave);
                zone.addEventListener('dragover', handleDragOver);
                zone.addEventListener('drop', handleDrop);
                zone.addEventListener('dragleave', handleDragLeave);
            });
            document.body.removeEventListener('dragover', handleGlobalDragOver);
            document.body.removeEventListener('drop', handleGlobalDrop);
            document.body.addEventListener('dragover', handleGlobalDragOver);
            document.body.addEventListener('drop', handleGlobalDrop);
        }

        function handleGlobalDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'none'; }
        function handleGlobalDrop(e) { e.preventDefault(); e.stopPropagation(); }

        document.addEventListener('DOMContentLoaded', () => { initializeDragAndDrop(); });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.todo-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function handleDragOver(e) {
            e.preventDefault(); e.stopPropagation();
            e.dataTransfer.dropEffect = 'move';
            let container;
            if (this.classList.contains('day-column')) container = this.querySelector('.todo-list');
            else if (this.classList.contains('section')) container = this.querySelector('.todo-list');
            else if (this.classList.contains('todo-list')) container = this;
            if (container) {
                afterElement = getDragAfterElement(container, e.clientY);
                document.querySelectorAll('.todo-item').forEach(item => item.classList.remove('drag-after'));
                if (afterElement) afterElement.classList.add('drag-after');
            }
            if (this.classList.contains('day-column')) this.classList.add('drag-over');
            return false;
        }

        function handleDragLeave(e) {
            if (this.classList.contains('day-column')) this.classList.remove('drag-over');
        }

        async function handleDrop(e) {
            e.stopPropagation(); e.preventDefault();
            if (this.classList.contains('day-column')) this.classList.remove('drag-over');
            if (!draggedElement) return;

            const todoId = draggedElement.dataset.id;
            let newSection, container;

            if (this.classList.contains('day-column')) {
                newSection = this.dataset.day; container = this.querySelector('.todo-list');
            } else if (this.classList.contains('todo-list')) {
                newSection = this.id; container = this;
            } else if (this.classList.contains('section')) {
                newSection = this.dataset.section; container = this.querySelector('.todo-list');
                if (newSection === 'prophet') { newSection = null; container = null; }
            }

            if (newSection && container) {
                dropSuccessful = true;
                const userId = window.currentUser.uid;
                const todoRef = ref(database, `users/${userId}/todos/${todoId}`);
                const snapshot = await get(todoRef);
                if (snapshot.exists()) {
                    const todo = snapshot.val();
                    let newOrder;
                    if (afterElement) {
                        const afterId = afterElement.dataset.id;
                        const afterSnapshot = await get(ref(database, `users/${userId}/todos/${afterId}`));
                        if (afterSnapshot.exists()) {
                            const afterTodo = afterSnapshot.val();
                            let beforeElement = afterElement.previousElementSibling;
                            while (beforeElement && beforeElement === draggedElement) beforeElement = beforeElement.previousElementSibling;
                            if (beforeElement) {
                                const beforeSnapshot = await get(ref(database, `users/${userId}/todos/${beforeElement.dataset.id}`));
                                if (beforeSnapshot.exists()) {
                                    const beforeOrder = beforeSnapshot.val().order || beforeSnapshot.val().createdAt || Date.now();
                                    const afterOrder = afterTodo.order || afterTodo.createdAt || Date.now();
                                    newOrder = (beforeOrder + afterOrder) / 2;
                                } else {
                                    newOrder = (afterTodo.order || afterTodo.createdAt || Date.now()) - 1;
                                }
                            } else {
                                newOrder = (afterTodo.order || afterTodo.createdAt || Date.now()) - 1;
                            }
                        } else { newOrder = Date.now(); }
                    } else {
                        const items = [...container.querySelectorAll('.todo-item:not(.dragging)')];
                        if (items.length > 0) {
                            const lastSnapshot = await get(ref(database, `users/${userId}/todos/${items[items.length-1].dataset.id}`));
                            newOrder = lastSnapshot.exists()
                                ? (lastSnapshot.val().order || lastSnapshot.val().createdAt || Date.now()) + 1
                                : Date.now();
                        } else { newOrder = Date.now(); }
                    }
                    await set(todoRef, { ...todo, section: newSection, order: newOrder });
                }
            }
            document.querySelectorAll('.todo-item').forEach(item => item.classList.remove('drag-after'));
            return false;
        }

        // ── Utilities ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function linkifyUrls(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return escapeHtml(text).replace(urlRegex, url =>
                `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
            );
        }
    </script>
</body>
